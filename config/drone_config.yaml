# =============================================================================
# 无人机配置 — Tello飞行参数
# =============================================================================
# 重要：编辑本文件时缩进必须用空格（不能用Tab），否则会解析失败
# 建议安装 VSCode EditorConfig 插件或 PyCharm 自动处理
# =============================================================================

# --------------------------- 连接参数 ---------------------------
connection:
  # Tello WiFi名称前缀，实际连接时会自动扫描 "Tello-XXXX" 格式的热点
  wifi_prefix: "Tello"
  # 连接超时（秒），超过此时间未连上则抛出异常
  connect_timeout: 10
  # 指令响应超时（秒），发送控制指令后等待响应的最大时间
  command_timeout: 5
  # 视频流缓冲区大小（字节），增大可减少卡顿但延迟增加
  video_buffer_size: 2048

# --------------------------- 飞行参数 ---------------------------
flight:
  # 默认飞行速度（cm/s），建议室内 10-30，室外空旷 30-60
  default_speed: 20
  # 最大允许飞行速度（cm/s），安全上限
  max_speed: 50
  # 默认悬停高度（cm），起飞后到达此高度悬停
  default_hover_height: 100
  # 最大飞行高度（cm），超过此高度自动触发降落
  max_height: 300
  # 单次移动指令的最大距离（cm），防止大步长导致碰撞
  max_single_move: 50
  # 悬停稳定等待时间（秒），到达目标位置后等待此时间再执行下一步
  hover_stabilize_time: 2.0

# --------------------------- 安全边界 ---------------------------
safety:
  # 飞行区域边界（以起飞点为原点的相对坐标，单位：cm）
  # 无人机不会超出此边界，超出时自动返回安全点
  boundary:
    x_min: -500    # 左边界
    x_max: 500     # 右边界
    y_min: -500    # 后边界
    y_max: 500     # 前边界
    z_min: 30      # 最低高度（cm），低于此高度视为着陆
    z_max: 300     # 最高高度（cm）

  # 安全点坐标（cm），触发安全机制时返回此位置悬停
  # 通常设为起飞点正上方100cm
  safe_point:
    x: 0
    y: 0
    z: 100

  # 近壁安全距离（cm），靠近模拟塔筒时保持的最小距离
  near_wall_min_distance: 100

  # 低电量自动降落阈值（百分比）
  low_battery_land_threshold: 20

# --------------------------- IMU噪声参数（用于EKF） ---------------------------
# 这些值描述Tello内置IMU传感器的噪声特性，用于卡尔曼滤波器的R矩阵
# 数值越大表示对传感器数据越不信任
imu_noise:
  # 加速度计噪声标准差（m/s^2），影响姿态估计精度
  accel_noise_std: 0.05
  # 陀螺仪噪声标准差（rad/s），影响角速度估计
  gyro_noise_std: 0.01
  # 光流定位噪声标准差（cm），影响水平位置估计
  optical_flow_noise_std: 2.0
  # 气压计高度噪声标准差（cm），影响垂直位置估计
  barometer_noise_std: 10.0

# --------------------------- 控制模式 ---------------------------
mode:
  # 默认运行模式：hardware | simulation | yolo_train
  # hardware: 连接真实Tello飞行
  # simulation: 纯软件仿真，不连接硬件
  # yolo_train: 仅运行YOLO训练/推理
  default_mode: "simulation"

  # 调试模式开关，开启后在控制台打印详细日志
  debug: true
