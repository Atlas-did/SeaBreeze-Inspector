# =============================================================================
# 无人机配置 — Tello飞行参数
# =============================================================================
# 重要：编辑本文件时缩进必须用空格（不能用Tab），否则会解析失败
# 建议安装 VSCode EditorConfig 插件或 PyCharm 自动处理
# =============================================================================

# --------------------------- 连接参数 ---------------------------
connection:
  # Tello WiFi名称前缀，实际连接时会自动扫描 "Tello-XXXX" 格式的热点
  wifi_prefix: "Tello"
  # 连接超时（秒），超过此时间未连上则抛出异常
  connect_timeout: 10
  # 指令响应超时（秒），发送控制指令后等待响应的最大时间
  command_timeout: 5
  # 视频流缓冲区大小（字节），增大可减少卡顿但延迟增加
  video_buffer_size: 2048

# --------------------------- 飞行参数 ---------------------------
flight:
  # 默认飞行速度（cm/s），建议室内 10-30，室外空旷 30-60
  default_speed: 20
  # 最大允许飞行速度（cm/s），安全上限
  max_speed: 50
  # 默认悬停高度（cm），起飞后到达此高度悬停
  default_hover_height: 100
  # 最大飞行高度（cm），超过此高度自动触发降落
  max_height: 300
  # 单次移动指令的最大距离（cm），防止大步长导致碰撞
  max_single_move: 50
  # 悬停稳定等待时间（秒），到达目标位置后等待此时间再执行下一步
  hover_stabilize_time: 2.0
  # 控制循环频率 (Hz), dt = 1/control_rate_hz
  control_rate_hz: 10

# --------------------------- 任务参数 ---------------------------
mission:
  # 巡检超时 (秒), INSPECT 超过此时间自动 RETURN
  inspect_timeout_s: 30
  # 路径点到达判定半径 (cm)
  waypoint_reach_radius: 30
  # 起飞完成判定余量 (cm), 高度差 < 此值视为到达悬停高度
  takeoff_done_margin: 20

# --------------------------- 控制器参数 ---------------------------
controller:
  # 比例增益 — 越大响应越快但越容易震荡
  Kp: 2.0
  # 积分增益 — 消除稳态误差，过大会导致积分饱和
  Ki: 0.1
  # 微分增益 — 抑制超调，对噪声敏感
  Kd: 1.0
  # D项低通滤波截止频率 (Hz), 抑制高频噪声放大 (0=禁用)
  d_cutoff_hz: 20
  # 积分分离阈值 (cm), 误差超过此值冻结 I 项
  integral_separation: 50

# --------------------------- 安全边界 ---------------------------
safety:
  # 飞行区域边界（以起飞点为原点的相对坐标，单位：cm）
  # 无人机不会超出此边界，超出时自动返回安全点
  boundary:
    x_min: -500    # 左边界
    x_max: 500     # 右边界
    y_min: -500    # 后边界
    y_max: 500     # 前边界
    z_min: 30      # 最低高度（cm），低于此高度视为着陆
    z_max: 300     # 最高高度（cm）

  # 安全点坐标（cm），触发安全机制时返回此位置悬停
  # 通常设为起飞点正上方100cm
  safe_point:
    x: 0
    y: 0
    z: 100

  # 近壁安全距离（cm），靠近模拟塔筒时保持的最小距离
  near_wall_min_distance: 100

  # 低电量自动降落阈值（百分比）
  low_battery_land_threshold: 20

  # 分层安全级别 (对应 mission/safety.py FailsafeMonitor)
  tiers:
    battery_warn:  20   # %  WARN 级别
    battery_land:  10   # %  LAND 级别
    battery_kill:   5   # %  KILL 级别
    attitude_land: 30   # 度 LAND 级别
    attitude_kill: 60   # 度 KILL 级别
    height_land:   300  # cm LAND 级别
    height_kill:   500  # cm KILL 级别
    timeout_land:  1.0  # s  LAND 级别
    timeout_kill:  3.0  # s  KILL 级别

# --------------------------- IMU噪声参数（用于EKF） ---------------------------
# 这些值描述Tello内置IMU传感器的噪声特性，用于卡尔曼滤波器的R矩阵
# 数值越大表示对传感器数据越不信任
imu_noise:
  # 加速度计噪声标准差（m/s^2），影响姿态估计精度
  accel_noise_std: 0.05
  # 陀螺仪噪声标准差（rad/s），影响角速度估计
  gyro_noise_std: 0.01
  # 光流定位噪声标准差（cm），影响水平位置估计
  optical_flow_noise_std: 2.0
  # 气压计高度噪声标准差（cm），影响垂直位置估计
  barometer_noise_std: 10.0
  # IMU 零偏漂移率 (m/s² per step), 模拟温度漂移
  accel_bias_drift: 0.001
  # IMU 随机游走标准差 (m/s²), 低频噪声累积
  accel_random_walk: 0.005

# --------------------------- 控制模式 ---------------------------
mode:
  # 默认运行模式：hardware | simulation | yolo_train
  # hardware: 连接真实Tello飞行
  # simulation: 纯软件仿真，不连接硬件
  # yolo_train: 仅运行YOLO训练/推理
  default_mode: "simulation"

  # 调试模式开关，开启后在控制台打印详细日志
  debug: true

# --------------------------- 仿真参数 ---------------------------
simulation:
  # 风扰动
  wind:
    base_x: 0.05    # N, X方向基础风力
    base_y: 0.02    # N, Y方向基础风力
    frequency: 0.5  # Hz, 阵风频率
    gust_amplitude: 0.03  # N, 阵风幅值

  # 风机塔筒
  turbine:
    radius: 3.0     # m, 塔筒半径
    height: 30.0    # m, 塔筒高度

  # 电池消耗
  battery:
    hover_drain: 1.5   # %/s, 悬停时电池消耗速率
    idle_drain: 0.1    # %/s, 待机时电池消耗速率
