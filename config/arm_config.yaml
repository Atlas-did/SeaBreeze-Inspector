# =============================================================================
# 机械臂配置 — 3DOF舵机控制与运动学参数
# =============================================================================
# 重要：编辑本文件时缩进必须用空格（不能用Tab），否则会解析失败
# =============================================================================

# --------------------------- 硬件接口 ---------------------------
hardware:
  # PCA9685舵机驱动板的I2C地址（默认0x40，通过板载焊盘可修改为0x41-0x7F）
  pca9685_i2c_address: "0x40"

  # 舵机连接通道号（PCA9685有16路PWM通道，编号0-15）
  servo_channels:
    base: 0       # 底座舵机：控制机械臂水平旋转（yaw）
    shoulder: 1   # 大臂舵机：控制大臂俯仰（pitch）
    elbow: 2      # 小臂舵机：控制小臂俯仰（pitch）

  # Arduino串口配置（通过USB连接）
  serial:
    # 串口波特率，Arduino端必须设置为相同值
    baudrate: 115200
    # 串口超时（秒）
    timeout: 1.0
    # 串口名称（Windows通常为 COM3/COM4，Linux为 /dev/ttyUSB0）
    # 留空时自动检测可用串口
    port: ""

# --------------------------- 舵机参数 ---------------------------
servo:
  # SG90舵机角度范围（度），物理极限为0-180，但建议留裕量
  angle_limits:
    base:
      min: 0      # 底座最小角度
      max: 180    # 底座最大角度
      default: 90 # 默认归中角度

    shoulder:
      min: 15     # 大臂最小角度（避免与机身碰撞）
      max: 165    # 大臂最大角度
      default: 90

    elbow:
      min: 0      # 小臂最小角度
      max: 180    # 小臂最大角度
      default: 90

  # 舵机运动速度限制（度/秒），防止过快导致抖动或共振
  max_speed_dps: 60

  # 舵机角度微调和校准偏移量（度）
  # 如果某个舵机安装时有机械偏移，在此补偿
  calibration_offset:
    base: 0
    shoulder: 0
    elbow: 0

# --------------------------- 连杆几何参数（单位：mm） ---------------------------
# 机械臂采用标准DH参数建模，以下长度为设计值，3D打印后需实测修正
kinematics:
  # 基座高度（Tello挂载面到第一个关节的垂直距离）
  base_height: 25

  # 连杆长度（关节中心到关节中心的距离）
  link_lengths:
    l1: 55   # 大臂长度（base → shoulder）
    l2: 45   # 小臂长度（shoulder → elbow）
    l3: 35   # 末端长度（elbow → end_effector）

  # 工作空间限制（相对于机械臂基座的圆柱坐标系，单位：mm）
  workspace:
    # 末端可到达的最小/最大半径
    r_min: 20
    r_max: 130
    # 末端可到达的最小/最大高度（相对于基座）
    z_min: -80
    z_max: 120

# --------------------------- 末端执行器 ---------------------------
end_effector:
  # 末端类型：camera | brush | marker
  type: "camera"
  # 末端负载质量（g），用于重心计算
  mass_grams: 15
  # 摄像头分辨率（用于末端摄像头独立拍摄时）
  camera_resolution:
    width: 640
    height: 480

# --------------------------- 减震与稳定 ---------------------------
vibration:
  # 是否在舵机运动时启用减震阻尼
  enable_damping: true
  # 运动平滑滤波窗口大小（越大越平滑但响应越慢）
  smooth_window: 3
